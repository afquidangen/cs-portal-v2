<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ComScite - Maintenance</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      background: #ffffff;
      position: relative;
      overflow: hidden;
    }

    .bg-glow-l { position: absolute; left: -10rem; top: -10rem; width: 500px; height: 500px; border-radius: 9999px; background: #eff6ff; filter: blur(64px); pointer-events: none; }
    .bg-glow-r { position: absolute; right: -10rem; bottom: -10rem; width: 500px; height: 500px; border-radius: 9999px; background: #eff6ff; filter: blur(64px); pointer-events: none; }

    .dot-tl {
      position: absolute; left: 2.5rem; top: 2.5rem; width: 5rem; height: 5rem; pointer-events: none;
      background-image: radial-gradient(circle, #0F5DFF 1.5px, transparent 1.5px);
      background-size: 12px 12px; opacity: 0.12;
    }
    .dot-br {
      position: absolute; right: 2.5rem; bottom: 2.5rem; width: 5rem; height: 5rem; pointer-events: none;
      background-image: radial-gradient(circle, #0F5DFF 1.5px, transparent 1.5px);
      background-size: 12px 12px; opacity: 0.12;
    }

    .container {
      width: 100%; max-width: 56rem; display: flex; flex-direction: column; align-items: center; gap: 2.5rem; text-align: center;
    }

    .logo {
      font-size: 3rem; font-weight: 800; line-height: 1;
      background: linear-gradient(90deg, #0F5DFF, #1E88FF);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    @media (min-width: 640px) {
      .logo { font-size: 3.75rem; }
    }

    .heading {
      max-width: 48rem; font-size: 2.5rem; font-weight: 800; line-height: 1.1; letter-spacing: -0.025em; color: #13254A;
      white-space: pre-line;
    }
    @media (min-width: 640px) {
      .heading { font-size: 3.5rem; }
    }

    .divider {
      width: 70px; height: 3px; border-radius: 9999px; background: #2F80FF; flex-shrink: 0;
    }

    .description {
      max-width: 42rem; font-size: 1.25rem; line-height: 1.75; color: #55627A; white-space: pre-line;
    }

    .plug-svg {
      width: 100%; max-width: 600px;
    }

    .card {
      width: 100%; max-width: 820px; display: flex; flex-direction: column; align-items: flex-start; gap: 1.5rem;
      border-radius: 1.5rem; border: 1px solid rgba(0,0,0,0.06); background: #ffffff; padding: 2rem;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04); text-align: left;
    }
    @media (min-width: 640px) {
      .card { flex-direction: row; align-items: center; }
    }

    .card-icon {
      width: 3.5rem; height: 3.5rem; display: flex; align-items: center; justify-content: center;
      border-radius: 9999px; background: #eff6ff; flex-shrink: 0;
    }
    .card-icon svg { width: 1.75rem; height: 1.75rem; color: #0F5DFF; }

    .card-text { display: flex; flex-direction: column; gap: 0.375rem; }
    .card-title { font-size: 1.5rem; font-weight: 700; color: #0F5DFF; }
    @media (min-width: 640px) {
      .card-title { font-size: 1.75rem; }
    }
    .card-body { font-size: 1.125rem; color: #5F6B81; white-space: pre-line; }

    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="bg-glow-l" aria-hidden="true"></div>
  <div class="bg-glow-r" aria-hidden="true"></div>
  <div class="dot-tl" aria-hidden="true"></div>
  <div class="dot-br" aria-hidden="true"></div>

  <div class="container">
    <h1 class="logo" id="logo-text">ComScite</h1>
    <h2 class="heading" id="heading">The site is currently<br/>down for maintenance</h2>
    <div class="divider" aria-hidden="true"></div>
    <p class="description" id="description">We apologize for any inconvenience caused.<br/>We've almost done.</p>

    <svg class="plug-svg" viewBox="0 0 800 200" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
      <ellipse cx="310" cy="175" rx="100" ry="8" fill="black" opacity="0.06" />
      <ellipse cx="490" cy="175" rx="100" ry="8" fill="black" opacity="0.06" />
      <path d="M0 90 Q100 90 160 90 Q200 90 210 100 L230 120" stroke="#0F5DFF" stroke-width="12" stroke-linecap="round" fill="none" />
      <rect x="220" y="110" width="100" height="40" rx="10" fill="url(#blueGrad)" stroke="#0F5DFF" stroke-width="1.5" />
      <rect x="222" y="112" width="96" height="14" rx="7" fill="white" opacity="0.25" />
      <rect x="320" y="118" width="22" height="6" rx="2" fill="#B0C4DE" />
      <rect x="320" y="136" width="22" height="6" rx="2" fill="#B0C4DE" />
      <rect x="342" y="118" width="4" height="6" rx="1" fill="#8AA8CE" />
      <rect x="342" y="136" width="4" height="6" rx="1" fill="#8AA8CE" />
      <rect x="222" y="118" width="8" height="24" rx="2" fill="white" opacity="0.15" />
      <path d="M800 90 Q700 90 640 90 Q600 90 590 100 L570 120" stroke="#2ECC40" stroke-width="12" stroke-linecap="round" fill="none" />
      <rect x="480" y="110" width="100" height="40" rx="10" fill="url(#greenGrad)" stroke="#2ECC40" stroke-width="1.5" />
      <rect x="482" y="112" width="96" height="14" rx="7" fill="white" opacity="0.25" />
      <rect x="484" y="118" width="20" height="6" rx="2" fill="#1A8A28" />
      <rect x="484" y="136" width="20" height="6" rx="2" fill="#1A8A28" />
      <rect x="484" y="118" width="8" height="6" rx="1" fill="#146B1F" />
      <rect x="484" y="136" width="8" height="6" rx="1" fill="#146B1F" />
      <rect x="570" y="118" width="8" height="24" rx="2" fill="white" opacity="0.15" />
      <path d="M380 110 L386 100 L392 110 L386 120 Z" fill="#4EA5FF" opacity="0.7" />
      <path d="M400 130 L406 118 L412 130 L406 142 Z" fill="#2ECC40" opacity="0.7" />
      <circle cx="390" cy="140" r="3" fill="#4EA5FF" opacity="0.5" />
      <circle cx="395" cy="105" r="2.5" fill="#2ECC40" opacity="0.5" />
      <circle cx="385" cy="128" r="2" fill="#4EA5FF" opacity="0.4" />
      <path d="M396 114 L393 124 L400 124 L396 136" stroke="#F5A623" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.6" />
      <defs>
        <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#4EA5FF" />
          <stop offset="100%" stop-color="#0F5DFF" />
        </linearGradient>
        <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#5EE078" />
          <stop offset="100%" stop-color="#2ECC40" />
        </linearGradient>
      </defs>
    </svg>

    <div class="card">
      <div class="card-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </div>
      <div class="card-text">
        <div class="card-title" id="card-title">Thank you for your patience!</div>
        <div class="card-body" id="card-body">Our team is working hard to improve your experience.<br/>We appreciate your understanding.</div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      var DEFAULTS = {
        logoText: "ComScite",
        maintenanceHeading: "The site is currently\ndown for maintenance",
        maintenanceDescription: "We apologize for any inconvenience caused.\nWe've almost done.",
        maintenanceCardTitle: "Thank you for your patience!",
        maintenanceCardBody: "Our team is working hard to improve your experience.\nWe appreciate your understanding."
      };

      function setText(id, text) {
        var el = document.getElementById(id);
        if (el) {
          el.textContent = text;
        }
      }

      fetch("/api/maintenance/status")
        .then(function(res) { return res.ok ? res.json() : null; })
        .then(function(data) {
          if (data) {
            setText("logo-text", data.logoText || DEFAULTS.logoText);
            setText("heading", data.maintenanceHeading || DEFAULTS.maintenanceHeading);
            setText("description", data.maintenanceDescription || DEFAULTS.maintenanceDescription);
            setText("card-title", data.maintenanceCardTitle || DEFAULTS.maintenanceCardTitle);
            setText("card-body", data.maintenanceCardBody || DEFAULTS.maintenanceCardBody);
          }
        })
        .catch(function() {});
    })();
  </script>
</body>
</html>
