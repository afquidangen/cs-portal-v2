<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Under Maintenance — ComScite Portal</title>
  <link rel="icon" href="/favicon.ico" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: #eaf2ff;
      color: #08142c;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at top, rgba(42,115,207,0.08) 0%, transparent 60%);
      pointer-events: none;
    }
    .container {
      position: relative;
      z-index: 10;
      max-width: 32rem;
      width: 100%;
      padding: 1.5rem;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .logo {
      width: 10rem;
      height: auto;
      margin-bottom: 2rem;
      filter: drop-shadow(0 24px 38px rgba(28,96,190,0.22));
    }
    @media (min-width: 640px) {
      .logo { width: 13rem; }
    }
    .icon-box {
      width: 5rem;
      height: 5rem;
      margin-bottom: 1rem;
      border-radius: 1rem;
      background: rgba(255,255,255,0.7);
      box-shadow: 0 10px 26px rgba(38,93,168,0.1);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon-box svg {
      width: 2.5rem;
      height: 2.5rem;
      color: #1b68cf;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
      color: #08142c;
    }
    @media (min-width: 640px) {
      h1 { font-size: 2.25rem; }
    }
    p {
      font-size: 1rem;
      line-height: 1.625;
      color: #1f4e8a;
      margin-bottom: 2rem;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      border-radius: 0.5rem;
      border: 1px solid rgba(255,255,255,0.7);
      background: rgba(255,255,255,0.58);
      padding: 0.375rem 1rem;
      font-size: 0.75rem;
      font-weight: 500;
      color: #164a95;
      box-shadow: 0 10px 26px rgba(38,93,168,0.1);
      backdrop-filter: blur(8px);
    }
    .dot {
      width: 0.5rem;
      height: 0.5rem;
      border-radius: 50%;
      background: #fbbf24;
      box-shadow: 0 0 0 4px rgba(251,191,36,0.14);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-box">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z" />
      </svg>
    </div>

    <img class="logo" src="/portal-logo.svg" alt="ComScite Portal" />

    <h1>Under Maintenance</h1>

    <p id="message">System is currently under maintenance. Please check back later.</p>

    <div class="badge">
      <span class="dot"></span>
      Maintenance Mode
    </div>
  </div>

  <script>
    fetch('/api/maintenance/status')
      .then(function(res) { return res.json(); })
      .then(function(data) {
        if (data.message) {
          document.getElementById('message').textContent = data.message;
        }
      })
      .catch(function() {});
  </script>
</body>
</html>
